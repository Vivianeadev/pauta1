<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Em construção · PautaZero</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --color-primary:#0a3147;--gold-primary:#D4AF37;--gold-dark:#B8860B;
    --color-bg:#fefaf5;--color-text-light:#2c3e4e;
    --font-serif:'Cinzel',serif;--font-sans:'Inter',sans-serif;
  }
  body{background:var(--color-bg);font-family:var(--font-sans);line-height:1.55;color:var(--color-text-light)}
  .container{max-width:700px;margin:0 auto;padding:3rem 20px;text-align:center}
  .construction-icon{font-size:4rem;color:var(--gold-dark);margin-bottom:1rem}
  h1{font-family:var(--font-serif);font-size:2rem;color:var(--color-primary);margin-bottom:1rem}
  p{margin-bottom:1.5rem}
  .back-link{display:inline-block;margin-top:1rem;padding:.6rem 1.2rem;border:1px solid var(--gold-primary);color:var(--gold-dark);text-decoration:none;font-size:.8rem;transition:.2s}
  .back-link:hover{background:rgba(212,175,55,.1)}
  .site-header{background:rgba(255,253,250,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,175,55,.2);padding:1rem 0}
  .header-inner{max-width:1280px;margin:0 auto;padding:0 36px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:1.8rem;font-weight:700;color:var(--color-primary);text-decoration:none;font-family:var(--font-serif)}
  .logo span{color:var(--gold-dark)}
  .site-footer{border-top:1px solid rgba(212,175,55,.2);padding:2rem 0;margin-top:2rem;background:var(--color-bg);font-size:.7rem;text-align:center}
  .newsletter-box{margin:2rem auto 1.5rem;max-width:450px;background:rgba(255,255,240,.6);padding:1.5rem;border-radius:24px;border:1px solid rgba(212,175,55,.3)}
  .newsletter-box h2{font-size:1.3rem;font-family:var(--font-serif);color:var(--color-primary);margin-bottom:.75rem}
  .form-group{margin-bottom:1rem;text-align:left}
  .form-group input{width:100%;padding:.8rem 1rem;border:1px solid #ccc;border-radius:0;font-family:var(--font-sans);font-size:.9rem;background:white}
  .form-group input:focus{outline:none;border-color:var(--gold-primary);box-shadow:0 0 0 2px rgba(212,175,55,.2)}
  .checkbox-group{display:flex;align-items:center;gap:8px;font-size:.75rem;text-align:left;margin:1rem 0}
  .checkbox-group input{width:18px;height:18px;margin:0}
  .btn-subscribe{background:var(--gold-primary);border:none;padding:.8rem 1.5rem;font-weight:600;border-radius:0;cursor:pointer;font-family:var(--font-sans);font-size:.9rem;color:var(--color-primary);width:100%}
  .btn-subscribe:hover{background:var(--gold-dark);color:white}
  #statusMsg{font-size:.8rem;margin-top:1rem}
  .privacy-note{font-size:.65rem;text-transform:lowercase;color:#7a6e5c;margin-top:1rem;border-top:1px solid rgba(212,175,55,.2);padding-top:1rem;letter-spacing:.3px}
  </style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">Pauta<span>Zero</span></a>
  </div>
</header>

<main class="container">
  <div class="construction-icon"><i class="fas fa-hard-hat"></i></div>
  <h1>Conteúdo em construção</h1>
  <p>Estamos desenvolvendo este artigo com a profundidade analítica que você espera.<br>Em breve estará disponível.</p>

  <div class="newsletter-box">
    <h2><i class="fas fa-bell"></i> avise-me quando pronto</h2>

    <form id="formNewsletter">
      <div class="form-group">
        <input type="email" id="email" placeholder="seu melhor e-mail" required>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="privacyConsent" required>
        <label>aceito a política</label>
      </div>

      <button type="submit" class="btn-subscribe">quero ser avisado</button>
      <div id="statusMsg"></div>
    </form>
  </div>

  <div class="privacy-note">
    <i class="fas fa-lock"></i> seus dados são protegidos
  </div>

  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> voltar</a>
</main>

<footer class="site-footer">
  <div class="container" style="font-size:.65rem;">© 2026 PautaZero</div>
</footer>

<script>
(function(){
  const _0x=["aHR0cHM6Ly9wYXV0YXplcm93YWl0bGlzdDEuYXZpemFlY29zeXN0ZW0ud29ya2Vycy5kZXYvc3Vic2NyaWJl","formNewsletter","statusMsg","email","privacyConsent"];
  const _d=i=>atob(_0x[i]);
  const f=document.getElementById(_d(1));
  const s=document.getElementById(_d(2));
  if(!f)return;

  f.addEventListener("submit",async function(e){
    e.preventDefault();
    const em=document.getElementById(_d(3)).value.trim();
    const c=document.getElementById(_d(4)).checked;

    if(!em||!em.includes("@")){s.innerHTML="❌ inválido";return}
    if(!c){s.innerHTML="❌ aceite";return}

    s.innerHTML="...";

    try{
      const r=await fetch(_d(0),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:em})
      });

      if(r.ok){s.innerHTML="✅ ok";f.reset()}
      else{s.innerHTML="❌ erro"}

    }catch(_){s.innerHTML="❌ falha"}
  });

  setInterval(()=>{debugger},3000);
})();
</script>

</body>
</html>
